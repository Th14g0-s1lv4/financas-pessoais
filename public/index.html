<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finanças Pessoais</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <span class="header-icon">📊</span>
      <h1>Finanças Pessoais</h1>
    </div>
    <div class="header-right">
      <label for="filtro-mes">Mês/Ano</label>
      <input type="month" id="filtro-mes">
    </div>
  </header>

  <!-- CARDS DE RESUMO -->
  <main>
    <section class="cards">
      <div class="card card-saldo">
        <p class="card-label">SALDO TOTAL</p>
        <h2 class="card-valor" id="saldo">R$ 0,00</h2>
        <span class="card-icone">💼</span>
      </div>
      <div class="card card-receita">
        <p class="card-label">RECEITAS</p>
        <h2 class="card-valor" id="receitas">R$ 0,00</h2>
        <span class="card-icone">⬆️</span>
      </div>
      <div class="card card-despesa">
        <p class="card-label">DESPESAS</p>
        <h2 class="card-valor" id="despesas">R$ 0,00</h2>
        <span class="card-icone">⬇️</span>
      </div>
    </section>

    <!-- FORMULÁRIO -->
    <section class="formulario">
      <h2>Nova Transação</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Descrição</label>
          <input type="text" id="descricao" placeholder="Ex: Salário, Aluguel...">
        </div>
        <div class="form-group">
          <label>Valor (R$)</label>
          <input type="number" id="valor" placeholder="Ex: 150,00">
        </div>
        <div class="form-group">
          <label>Tipo</label>
          <select id="tipo">
            <option value="">Selecione...</option>
            <option value="receita">Receita</option>
            <option value="despesa">Despesa</option>
          </select>
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <select id="categoria">
            <option value="">Selecione...</option>
            <option value="Trabalho">Trabalho</option>
            <option value="Freelancer">Frelancer</option>
            <option value="Alimentação">Alimentação</option>
            <option value="Moradia">Moradia</option>
            <option value="Transporte">Transporte</option>
            <option value="Saúde">Saúde</option>
            <option value="Lazer">Lazer</option>
            <option value="Investimentos">Investimentos</option>
            <option value="Utilidades">Utilidades</option>
            <option value="Vendas">Vendas</option>
            <option value="Outros">Outros</option>
          </select>
        </div>
        <div class="form-group">
          <label>Data</label>
          <input type="date" id="data">
        </div>
      </div>
      <button id="btn-adicionar">Adicionar Transação</button>
    </section>

    <!-- TABELA -->
    <section class="tabela-section">
      <h2>📋 Transações</h2>
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Descrição</th>
            <th>Categoria</th>
            <th>Tipo</th>
            <th>Valor</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody id="lista">
          <!-- linhas geradas pelo JavaScript -->
        </tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
